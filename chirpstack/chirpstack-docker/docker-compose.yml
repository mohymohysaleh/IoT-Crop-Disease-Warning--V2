services:
  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
    depends_on:
      - postgres
      - mosquitto
      - redis
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=postgres
    ports:
      - "8080:8080"

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - "1700:1700/udp"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/command/#
      - INTEGRATION__MQTT__MARSHALER=json
    depends_on:
      - mosquitto

  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "3001:3001"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      - "8090:8090"
    depends_on:
      - chirpstack

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    volumes:
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=chirpstack
      - POSTGRES_PASSWORD=chirpstack
      - POSTGRES_DB=chirpstack

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # If a local Mosquitto (Windows service) already uses host 1883, use e.g. "1884:1883" and set MQTT_PORT=1884 for host-run scripts.
      - "1884:1883"
    volumes:
      - ./configuration/mosquitto/config/:/mosquitto/config/

  # ChirpStack MQTT (application/…/event/up) → ThingsBoard CE over HTTP (no PE “Integrations”).
  tb-chirpstack-bridge:
    build:
      context: .
      dockerfile: Dockerfile.tb-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
      - thingsboard
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      TB_URL: http://thingsboard:9090
    env_file:
      - .env

  # Assignment 2 (ThingsBoard): UI http://localhost:9090 (sysadmin/sysadmin → change immediately)
  # MQTT for devices/integration: localhost:11883 → container port 1883
  thingsboard:
    image: thingsboard/tb-postgres:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "9090:9090"
      - "11883:1883"
    environment:
      TB_QUEUE_TYPE: in-memory
      JAVA_OPTS: "-Xms256M -Xmx768M -Dplatform=deb -Dinstall.data_dir=/data"
    volumes:
      - thingsboard-data:/data

volumes:
  postgresqldata:
  redisdata:
  thingsboard-data:
